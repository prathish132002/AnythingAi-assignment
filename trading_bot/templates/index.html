<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Binance Futures Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f14;
            --sidebar-bg: #14171d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #f0b90b; /* Binance Gold */
            --primary-glow: rgba(240, 185, 11, 0.3);
            --buy-color: #0ecb81;
            --buy-glow: rgba(14, 203, 129, 0.2);
            --sell-color: #f6465d;
            --sell-glow: rgba(246, 70, 93, 0.2);
            --text-main: #ffffff;
            --text-dim: #9299a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, blinkmacsystemfont, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .logo svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .order-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input {
            background: #1e222d;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            outline: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        option {
            background-color: #1e222d;
            color: #fff;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            background: rgba(240, 185, 11, 0.05);
        }

        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-buy {
            background: var(--buy-color);
            color: #000;
            box-shadow: 0 4px 12px var(--buy-glow);
        }

        .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--buy-glow);
        }

        .btn-sell {
            background: var(--sell-color);
            color: #fff;
            box-shadow: 0 4px 12px var(--sell-glow);
        }

        .btn-sell:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--sell-glow);
        }

        /* --- Main Content --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            height: 64px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: rgba(20, 23, 29, 0.5);
            backdrop-filter: blur(10px);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
        }

        .indicator.active {
            background: var(--buy-color);
            box-shadow: 0 0 10px var(--buy-color);
        }

        /* --- Chart Area --- */
        .chart-container {
            flex: 1;
            padding: 16px;
            background: #000;
        }

        #tradingview_chart {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* --- Logs Panel --- */
        .logs-panel {
            height: 250px;
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .logs-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logs-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }

        #log-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #ccc;
        }

        .log-entry {
            margin-bottom: 6px;
            white-space: pre-wrap;
            border-left: 2px solid transparent;
            padding-left: 10px;
        }

        .log-info { color: #51afef; border-left-color: #51afef; }
        .log-success { color: #98be65; border-left-color: #98be65; }
        .log-error { color: #ff6c6b; border-left-color: #ff6c6b; }

        /* Notification Toast */
        #notification {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            background: #1e222d;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: translateX(200%);
            transition: transform 0.3s ease;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #notification.show { transform: translateX(0); }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M16.624 13.9202l-4.624 4.624-4.624-4.624 4.624-4.624 4.624 4.624zm3.0336-1.3404l-1.3404-1.3404-1.6932 1.6932 1.3404 1.3404 1.6932-1.6932zm-12.0168-1.3404l1.3404-1.3404 1.6932 1.6932-1.3404 1.3404-1.6932-1.6932zm1.3404 5.374l1.3404 1.3404-1.6932 1.6932-1.3404-1.3404 1.6932-1.6932zm5.6664 2.6932l-1.3404 1.3404-1.6932-1.6932 1.3404-1.3404 1.6932 1.6932zM12 0l-1.6932 1.6932 1.3404 1.3404 1.6932-1.6932L12 0zM8.3068 1.6932L6.9664.3528 5.626 1.6932l1.3404 1.3404 1.3404-1.3404zM3.9312 3.9312l-1.3404-1.3404-1.3404 1.3404 1.3404 1.3404 1.3404-1.3404zM1.6932 8.3068L.3528 6.9664 1.6932 5.626l1.3404 1.3404L1.6932 8.3068zm0 7.3864l-1.3404 1.3404 1.3404 1.3404 1.3404-1.3404-1.3404-1.3404zm2.238 4.3756l1.3404 1.3404 1.3404-1.3404-1.3404-1.3404-1.3404 1.3404zm4.3756 2.238l1.3404 1.3404 1.3404-1.3404-1.3404-1.3404-1.3404 1.3404z"/></svg>
            BINANCE BOT
        </div>

        <form id="orderForm" class="order-form">
            <div class="form-group">
                <label>Instrument</label>
                <select id="symbol" name="symbol">
                    <option value="BTCUSDT">BTC/USDT</option>
                    <option value="ETHUSDT">ETH/USDT</option>
                    <option value="BNBUSDT">BNB/USDT</option>
                    <option value="SOLUSDT">SOL/USDT</option>
                </select>
            </div>

            <div class="form-group">
                <label>Order Type</label>
                <select id="order_type" name="order_type" onchange="toggleFields()">
                    <option value="MARKET">Market</option>
                    <option value="LIMIT">Limit</option>
                    <option value="STOP">Stop-Limit</option>
                </select>
            </div>

            <div class="form-group">
                <label>Quantity (USDT)</label>
                <input type="number" id="quantity" name="quantity" placeholder="0.01" step="0.001" required>
            </div>

            <div class="form-group hidden" id="price_group">
                <label>Price</label>
                <input type="number" id="price" name="price" placeholder="45000" step="0.1">
            </div>

            <div class="form-group hidden" id="stop_price_group">
                <label>Stop Price</label>
                <input type="number" id="stop_price" name="stop_price" placeholder="44800" step="0.1">
            </div>

            <div class="btn-container">
                <button type="button" class="btn btn-buy" onclick="submitOrder('BUY')">Buy / Long</button>
                <button type="button" class="btn btn-sell" onclick="submitOrder('SELL')">Sell / Short</button>
            </div>
        </form>

        <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-dim); background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;">
            <p><strong>Environment:</strong> Testnet</p>
            <p><strong>API Key:</strong> <span id="apiKeyStatus" class="{{ 'active' if api_key_status else '' }}">●</span> {{ 'Configured' if api_key_status else 'Missing' }}</p>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <div id="active-ticker" style="font-weight: 700; letter-spacing: 1px;">BTCUSDT <span style="color: var(--buy-color); margin-left:10px;">+2.45%</span></div>
            <div class="status-badge">
                <div class="indicator active"></div>
                SYSTEM ONLINE
            </div>
        </header>

        <div class="chart-container">
            <div id="tradingview_chart"></div>
        </div>

        <section class="logs-panel">
            <div class="logs-header">
                <div class="logs-title">Terminal Logs</div>
                <button onclick="fetchLogs()" style="background: none; border: none; color: var(--primary); font-size: 0.7rem; cursor: pointer; text-transform: uppercase; font-weight: 700;">Refresh</button>
            </div>
            <div id="log-container">
                <div class="log-entry log-info">[SYSTEM] Initializing stream...</div>
            </div>
        </section>
    </main>

    <div id="notification">
        <span id="notif-icon">✅</span>
        <span id="notif-msg">Order Placed Successfully!</span>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Init Chart
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT.P",
            "interval": "5",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "save_image": false,
            "container_id": "tradingview_chart"
        });

        function toggleFields() {
            const type = document.getElementById('order_type').value;
            const priceGrp = document.getElementById('price_group');
            const stopPriceGrp = document.getElementById('stop_price_group');

            if (type === 'MARKET') {
                priceGrp.classList.add('hidden');
                stopPriceGrp.classList.add('hidden');
            } else if (type === 'LIMIT') {
                priceGrp.classList.remove('hidden');
                stopPriceGrp.classList.add('hidden');
            } else if (type === 'STOP') {
                priceGrp.classList.remove('hidden');
                stopPriceGrp.classList.remove('hidden');
            }
        }

        async function submitOrder(side) {
            const form = document.getElementById('orderForm');
            const formData = new FormData(form);
            formData.append('side', side);

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'WAITING...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/order', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.status === 'success') {
                    showNotification('✅ SUCCESS', 'Order executed. ID: ' + result.data.orderId);
                    appendLog(`[ORDER] ${side} ${formData.get('quantity')} ${formData.get('symbol')} @ ${result.data.avgPrice || 'MARKET'} - SUCCESS`, 'log-success');
                } else {
                    showNotification('❌ FAILED', result.message);
                    appendLog(`[ERROR] ${result.message}`, 'log-error');
                }
            } catch (err) {
                showNotification('❌ ERROR', 'Network error occurred');
                appendLog(`[SYSTEM] Network Error: ${err.message}`, 'log-error');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                fetchLogs();
            }
        }

        function showNotification(title, msg) {
            const notif = document.getElementById('notification');
            document.getElementById('notif-msg').innerText = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 4000);
        }

        function appendLog(msg, typeClass) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = 'log-entry ' + typeClass;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            container.prepend(div);
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                const container = document.getElementById('log-container');
                container.innerHTML = '';
                data.logs.reverse().forEach(line => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    if (line.includes('ERROR')) div.classList.add('log-error');
                    else if (line.includes('Success')) div.classList.add('log-success');
                    else div.classList.add('log-info');
                    div.innerText = line;
                    container.appendChild(div);
                });
            } catch (e) {}
        }

        // Auto Refresh Logs
        setInterval(fetchLogs, 5000);
        fetchLogs();

        // Symbol change watcher
        document.getElementById('symbol').addEventListener('change', (e) => {
            const ticker = e.target.value;
            document.getElementById('active-ticker').innerText = ticker;
            // Refresh widget (rebuild for simplicity)
             new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + ticker + ".P",
                "interval": "5",
                "theme": "dark",
                "container_id": "tradingview_chart"
            });
        });

    </script>
</body>
</html>
